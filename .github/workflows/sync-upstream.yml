name: Sync with upstream

on:
  schedule:
    # Run daily at 6:17 AM UTC
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync fork with tw93/Mole
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4
        with:
          fetch-depth: 0
          # PAT with workflow scope required to push upstream workflow file changes
          token: ${{ secrets.SYNC_PAT }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/tw93/Mole.git || true
          git fetch upstream --tags

      - name: Sync upstream changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest fork state before doing anything
          git pull origin main --rebase

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          # Check if upstream is already an ancestor of our fork (already synced)
          IS_ANCESTOR=$(git merge-base --is-ancestor "$UPSTREAM" "$LOCAL" && echo "yes" || echo "no")

          if [ "$IS_ANCESTOR" = "yes" ]; then
            echo "Fork is already up to date"
          else
            echo "New upstream commits detected, merging..."
            # Use -X theirs to resolve conflicts in favour of upstream
            # (CONTRIBUTORS.svg is auto-generated and causes conflicts)
            git merge upstream/main --no-edit -X theirs -m "chore: sync with upstream tw93/Mole"
            git push origin main
            echo "Fork synced successfully"
          fi
